<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoadTrip">
  <title>RoadTrip 2026 Photos</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <main id="main-content">
    <div class="loading">Loading trip…</div>
  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-screen="today">
      <span class="nav-icon">📅</span>Today
    </button>
    <button class="nav-item" data-screen="timeline">
      <span class="nav-icon">🗓️</span>Timeline
    </button>
    <button class="nav-item" data-screen="stops">
      <span class="nav-icon">📍</span>Stops
    </button>
    <button class="nav-item" data-screen="gallery">
      <span class="nav-icon">🖼️</span>Gallery
    </button>
    <button class="nav-item" data-screen="backup">
      <span class="nav-icon">💾</span>Backup
    </button>
  </nav>
</div>

<!-- ── Modal: Photo Picker ───────────────────────────────── -->
<div class="modal" id="modal-picker">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">Add Photo</span>
      <button class="modal-close" id="close-picker">✕</button>
    </div>
    <div class="modal-body">
      <div class="picker-options">
        <button class="picker-btn" id="btn-camera">
          <span class="picker-icon">📷</span>
          <div>
            <div style="font-size:17px;font-weight:700">Take Photo</div>
            <div style="font-size:13px;color:var(--muted);font-weight:400">Use your camera</div>
          </div>
        </button>
        <button class="picker-btn" id="btn-library">
          <span class="picker-icon">🖼️</span>
          <div>
            <div style="font-size:17px;font-weight:700">Choose from Library</div>
            <div style="font-size:13px;color:var(--muted);font-weight:400">Pick one or multiple photos</div>
          </div>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: Tag Editor ─────────────────────────────────── -->
<div class="modal" id="modal-tag">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">Tag Photo</span>
      <button class="modal-close" id="close-tag">✕</button>
    </div>
    <div class="modal-body">
      <img id="tag-preview-img" class="tag-preview" src="" alt="">
      <div id="tag-form-status" class="tag-form-status"></div>
      <div id="tag-form-fields"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="tag-save-btn">💾 Save Photo</button>
    </div>
  </div>
</div>

<!-- ── Modal: Photo Detail ───────────────────────────────── -->
<div class="modal" id="modal-detail">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">Photo</span>
      <button class="modal-close" id="close-detail">✕</button>
    </div>
    <div class="modal-body"></div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-camera" class="hidden-input" accept="image/*" capture="environment">
<input type="file" id="file-library" class="hidden-input" accept="image/*" multiple>

<!-- Scripts (order matters) -->
<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/photos.js"></script>
<script src="js/exportImport.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>

</body>
</html>
